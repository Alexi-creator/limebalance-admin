services:
  web:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file: .env
    environment:
      # backend runs on the host → proxy /api there, not to the container's localhost
      - VITE_DEV_PROXY_TARGET=http://host.docker.internal:3000
    extra_hosts:
      # needed on Linux hosts; on Docker Desktop (Mac/Win) it already resolves
      - "host.docker.internal:host-gateway"
