name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    # Deploy runs only after the E2E tests pass.
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check VPS configured
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "::error::SSH_HOST secret is not set. Add VPS secrets to enable deployment."
            exit 1
          fi

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          GHCR_IMAGE: ${{ env.IMAGE_NAME }}:latest
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_IMAGE,GHCR_TOKEN,GHCR_ACTOR
          script: |
            set -e

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

            echo "::group::Pull new image"
            docker pull "$GHCR_IMAGE"
            echo "::endgroup::"

            echo "::group::Restart container"
            docker stop limebalance-admin 2>/dev/null || true
            docker rm limebalance-admin 2>/dev/null || true
            docker run -d \
              --name limebalance-admin \
              --env-file /opt/limebalance-admin/.env \
              --restart unless-stopped \
              -p 127.0.0.1:3002:80 \
              "$GHCR_IMAGE"
            echo "::endgroup::"

            echo "::group::Cleanup old images"
            docker image prune -f --filter "until=72h"
            echo "::endgroup::"
