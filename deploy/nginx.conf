server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # env-config.js is generated on container start — do not cache.
  location /env-config.js {
    add_header Cache-Control "no-store";
  }

  # Hashed Vite assets (filename contains a content hash) are immutable —
  # cache them long-term: when content changes, the filename changes too.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # SPA fallback: serve index.html for every route.
  # index.html must NOT be cached — otherwise after a deploy the browser keeps
  # a stale copy referencing already-removed hashed chunks and the app breaks.
  location / {
    add_header Cache-Control "no-store, must-revalidate";
    try_files $uri $uri/ /index.html;
  }
}
